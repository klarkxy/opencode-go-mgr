name: Quality

on:
  workflow_call:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Tests, types, and lint
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.29.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: quality-linux
          workspaces: ". -> target"
          cache-on-failure: ${{ github.event_name == 'workflow_dispatch' }}
          save-if: ${{ github.event_name != 'pull_request' }}

      - run: pnpm install --frozen-lockfile
      - run: cargo fmt --all -- --check
      - run: pnpm run test
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: pnpm run design:lint
      - run: docker compose -f compose.example.yaml config --quiet
