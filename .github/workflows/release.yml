name: Cross-platform release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Platform candidate to build; production tag pushes always build every platform
        required: true
        default: all
        type: choice
        options:
          - all
          - windows-x64
          - macos-universal
          - linux-x64
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  plan:
    name: Resolve release matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      production: ${{ steps.matrix.outputs.production }}

    steps:
      - name: Select platforms
        id: matrix
        shell: bash
        env:
          REQUESTED_TARGET: ${{ inputs.target || 'all' }}
        run: |
          set -euo pipefail
          target="$REQUESTED_TARGET"
          production=false
          if [[ "$GITHUB_EVENT_NAME" == push && "$GITHUB_REF" == refs/tags/v* ]]; then
            production=true
            target=all
          fi
          case "$target" in
            all)
              matrix='{"include":[{"name":"Windows x64","os":"windows-latest","artifact":"release-windows-x64"},{"name":"macOS Universal","os":"macos-15","artifact":"release-macos-universal"},{"name":"Linux x64","os":"ubuntu-22.04","artifact":"release-linux-x64"}]}'
              ;;
            windows-x64)
              matrix='{"include":[{"name":"Windows x64","os":"windows-latest","artifact":"release-windows-x64"}]}'
              ;;
            macos-universal)
              matrix='{"include":[{"name":"macOS Universal","os":"macos-15","artifact":"release-macos-universal"}]}'
              ;;
            linux-x64)
              matrix='{"include":[{"name":"Linux x64","os":"ubuntu-22.04","artifact":"release-linux-x64"}]}'
              ;;
            *)
              echo "Unsupported release target: $target" >&2
              exit 1
              ;;
          esac
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "production=$production" >> "$GITHUB_OUTPUT"

  quality:
    uses: ./.github/workflows/quality.yml

  preflight:
    name: Release preflight
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.29.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Validate Windows release smoke
        shell: pwsh
        run: ./scripts/validate-windows-release-smoke.ps1
      - name: Test release helpers
        run: node --test scripts/generate-updater-manifest.test.mjs scripts/release-policy.test.mjs scripts/verify-release-assets.test.mjs
      - name: Validate version and unsigned candidate contract
        run: pnpm run release:check

  build:
    name: ${{ matrix.name }}
    needs:
      - plan
      - preflight
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.29.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev patchelf libfuse2 xvfb xauth xdg-utils dbus-x11

      - name: Install macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-${{ matrix.artifact }}
          workspaces: ". -> target"
          cache-on-failure: ${{ github.event_name == 'workflow_dispatch' }}
          save-if: "true"

      - run: pnpm install --frozen-lockfile

      - name: Validate production signing pair and public-key continuity
        if: needs.plan.outputs.production == 'true'
        env:
          OCG_REQUIRE_UPDATER_ARTIFACTS: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ needs.plan.outputs.production == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ needs.plan.outputs.production == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ needs.plan.outputs.production == 'true' && vars.TAURI_UPDATER_PUBLIC_KEY || '' }}
        run: pnpm run release:check

      - name: Build platform artifacts
        env:
          OCG_REQUIRE_UPDATER_ARTIFACTS: ${{ needs.plan.outputs.production == 'true' && '1' || '0' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ needs.plan.outputs.production == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY || '' }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ needs.plan.outputs.production == 'true' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || '' }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ needs.plan.outputs.production == 'true' && vars.TAURI_UPDATER_PUBLIC_KEY || '' }}
        run: pnpm run build

      - name: Smoke packaged CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-Content release/SHA256SUMS | ForEach-Object {
            if ($_ -notmatch '^([0-9a-f]{64})  (.+)$') { throw "Invalid checksum line: $_" }
            $actual = (Get-FileHash -Algorithm SHA256 (Join-Path release $Matches[2])).Hash.ToLowerInvariant()
            if ($actual -ne $Matches[1]) { throw "Checksum mismatch: $($Matches[2])" }
          }

          $package = Join-Path $env:RUNNER_TEMP cli-package
          Expand-Archive (Get-Item release/*windows-x64.zip) $package
          $cli = Join-Path $package ocg-manager-cli.exe
          if (!(Test-Path $cli) -or !(Test-Path (Join-Path $package dist/index.html)) -or !(Test-Path (Join-Path $package LICENSE))) {
            throw 'CLI package is incomplete'
          }

          $data = Join-Path $env:RUNNER_TEMP cli-data
          $added = (& $cli "--data-dir=$data" key add ci-smoke sk-ci-smoke | Out-String)
          if ($added -notmatch 'added key ([0-9a-f-]{36})') { throw "Cannot read account id: $added" }
          $id = $Matches[1]
          if (-not (& $cli "--data-dir=$data" key list | Select-String -SimpleMatch ci-smoke)) { throw 'Added account is missing' }
          & $cli "--data-dir=$data" key disable $id
          & $cli "--data-dir=$data" key enable $id
          if (-not (& $cli "--data-dir=$data" status | Select-String -SimpleMatch '1 total, 1 enabled')) { throw 'Unexpected CLI status' }

          $stdout = Join-Path $env:RUNNER_TEMP cli-serve.stdout.log
          $stderr = Join-Path $env:RUNNER_TEMP cli-serve.stderr.log
          $server = Start-Process $cli -ArgumentList @("--data-dir=$data", 'serve', '--port=19042') -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru -WindowStyle Hidden
          try {
            $ready = $false
            foreach ($attempt in 1..30) {
              try {
                if ((Invoke-WebRequest http://127.0.0.1:19042/dashboard/ -UseBasicParsing).Content -match 'id="app"') { $ready = $true; break }
              } catch {}
              Start-Sleep 1
            }
            if (!$ready) { throw "Packaged CLI dashboard did not start`n$(Get-Content $stdout, $stderr -ErrorAction SilentlyContinue | Out-String)" }
          } finally {
            if (!$server.HasExited) { Stop-Process -Id $server.Id -Force; $server.WaitForExit() }
          }

          & $cli "--data-dir=$data" key remove $id
          if (& $cli "--data-dir=$data" key list | Select-String -SimpleMatch ci-smoke) { throw 'Removed account is still listed' }

      - name: Smoke packaged CLI (macOS and Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = macOS ]; then
            (cd release && shasum -a 256 -c SHA256SUMS)
          else
            (cd release && sha256sum -c SHA256SUMS)
          fi

          package="$RUNNER_TEMP/cli-package"
          mkdir "$package"
          tar -xzf release/ocg-manager-cli_*.tar.gz -C "$package"
          cli="$package/ocg-manager-cli"
          test -x "$cli"
          test -f "$package/dist/index.html"
          test -f "$package/LICENSE"
          if [ "$RUNNER_OS" = macOS ]; then archs=$(lipo -archs "$cli"); grep -qw x86_64 <<<"$archs"; grep -qw arm64 <<<"$archs"; fi

          data="$RUNNER_TEMP/cli-data"
          added=$("$cli" --data-dir="$data" key add ci-smoke sk-ci-smoke)
          id=$(printf '%s\n' "$added" | sed -n 's/^added key \([^ ]*\).*/\1/p')
          test -n "$id"
          "$cli" --data-dir="$data" key list | grep -q ci-smoke
          "$cli" --data-dir="$data" key disable "$id"
          "$cli" --data-dir="$data" key enable "$id"
          "$cli" --data-dir="$data" status | grep -q '1 total, 1 enabled'

          log="$RUNNER_TEMP/cli-serve.log"
          "$cli" --data-dir="$data" serve --port=19042 >"$log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          ready=
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:19042/dashboard/ -o "$RUNNER_TEMP/dashboard.html" && grep -q 'id="app"' "$RUNNER_TEMP/dashboard.html"; then ready=1; break; fi
            sleep 1
          done
          if [ -z "$ready" ]; then cat "$log"; exit 1; fi
          kill "$server_pid"
          wait "$server_pid" || true
          trap - EXIT

          "$cli" --data-dir="$data" key remove "$id"
          remaining=$("$cli" --data-dir="$data" key list)
          ! grep -q ci-smoke <<<"$remaining"

      - name: Smoke installed GUI and overwrite bootstrap (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $candidateVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $candidateInstaller = (Get-Item release/*windows-x64-setup.exe).FullName
          $parameters = @{
            CandidateInstaller = $candidateInstaller
            CandidateVersion = $candidateVersion
            InstallDirectory = (Join-Path $env:RUNNER_TEMP ocg-manager-install)
            DataDirectory = (Join-Path $env:USERPROFILE .ocg-mgr)
          }

          $latestTag = ''
          try {
            $latestTag = (& gh release view --repo $env:GITHUB_REPOSITORY --json tagName --jq .tagName).Trim()
            if ($LASTEXITCODE -ne 0) { throw 'gh release view failed' }
          } catch {
            if ($env:GITHUB_REF_TYPE -eq 'tag') {
              throw 'A tag release smoke requires a current published GitHub Release for the overwrite bootstrap.'
            }
            Write-Host 'No published release is available; using the candidate-only install smoke.'
          }

          $latestVersion = $latestTag -replace '^v', ''
          if ($latestTag -and !($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch' -and $latestVersion -eq $candidateVersion)) {
            $previousDir = Join-Path $env:RUNNER_TEMP previous-release
            New-Item -ItemType Directory -Force $previousDir | Out-Null
            & gh release download $latestTag --repo $env:GITHUB_REPOSITORY --pattern 'ocg-manager_*_windows-x64-setup.exe' --dir $previousDir
            if ($LASTEXITCODE -ne 0) { throw "Cannot download the published $latestTag Windows installer" }
            $previousInstallers = @(Get-ChildItem $previousDir -Filter '*windows-x64-setup.exe')
            if ($previousInstallers.Count -ne 1) {
              throw "Expected one published Windows installer for $latestTag, found $($previousInstallers.Count)"
            }
            $parameters.PreviousInstaller = $previousInstallers[0].FullName
            $parameters.PreviousTag = $latestTag
          } elseif ($latestTag) {
            Write-Host "Candidate v$candidateVersion is already latest; using the candidate-only install smoke."
          }

          ./scripts/smoke-windows-release.ps1 @parameters

      - name: Smoke mounted GUI (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mount="$RUNNER_TEMP/ocg-manager-dmg"
          mkdir "$mount"
          printf 'Y\n' | hdiutil attach release/ocg-manager_*_macos-universal.dmg -nobrowse -readonly -mountpoint "$mount"
          cleanup() {
            if [ -n "${gui_pid:-}" ]; then kill "$gui_pid" 2>/dev/null || true; fi
            hdiutil detach "$mount" -force >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          app=$(find "$mount" -maxdepth 1 -name '*.app' -print -quit)
          test -n "$app"
          gui="$app/Contents/MacOS/ocg-manager"
          test -x "$gui"
          codesign --verify --deep --strict "$app"
          archs=$(lipo -archs "$gui")
          grep -qw x86_64 <<<"$archs"
          grep -qw arm64 <<<"$archs"

          home="$RUNNER_TEMP/ocg-manager-home"
          mkdir "$home"
          HOME="$home" "$gui" --startup >"$RUNNER_TEMP/gui.log" 2>&1 &
          gui_pid=$!
          ready=
          for _ in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:9042/dashboard/ -o "$RUNNER_TEMP/dashboard.html" && grep -q 'id="app"' "$RUNNER_TEMP/dashboard.html"; then ready=1; break; fi
            sleep 1
          done
          if [ -z "$ready" ]; then cat "$RUNNER_TEMP/gui.log"; exit 1; fi

      - name: Smoke AppImage GUI (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          appimage=$(echo release/ocg-manager_*_linux-x64.AppImage)
          deb=$(echo release/ocg-manager_*_linux-x64.deb)
          dpkg-deb --info "$deb" >/dev/null
          dpkg-deb --contents "$deb" >"$RUNNER_TEMP/deb-contents"
          grep -q ocg-manager "$RUNNER_TEMP/deb-contents"
          file "$appimage" | grep -q 'x86-64'
          chmod +x "$appimage"

          home="$RUNNER_TEMP/ocg-manager-home"
          runtime="$RUNNER_TEMP/xdg-runtime"
          mkdir "$home" "$runtime"
          chmod 700 "$runtime"
          setsid dbus-run-session -- xvfb-run -a env HOME="$home" XDG_RUNTIME_DIR="$runtime" APPIMAGE_EXTRACT_AND_RUN=1 WEBKIT_DISABLE_COMPOSITING_MODE=1 "$appimage" --startup >"$RUNNER_TEMP/gui.log" 2>&1 &
          gui_pid=$!
          trap 'kill -- -"$gui_pid" 2>/dev/null || true' EXIT
          ready=
          for _ in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:9042/dashboard/ -o "$RUNNER_TEMP/dashboard.html" && grep -q 'id="app"' "$RUNNER_TEMP/dashboard.html"; then ready=1; break; fi
            sleep 1
          done
          if [ -z "$ready" ]; then cat "$RUNNER_TEMP/gui.log"; exit 1; fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  draft-release:
    name: Draft GitHub release
    if: needs.plan.outputs.production == 'true'
    needs:
      - plan
      - quality
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: artifacts

      - name: Assemble release and checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir release
          find artifacts -type f ! -name SHA256SUMS -exec cp {} release/ \;
          cp compose.example.yaml release/
          node scripts/generate-updater-manifest.mjs \
            --release-dir release \
            --tag "$GITHUB_REF_NAME" \
            --repository "$GITHUB_REPOSITORY"
          (cd release && sha256sum * > SHA256SUMS)

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: assembled-release
          path: release/*
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
          overwrite: true

      - name: Create or update draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          notes="Updater payloads include Tauri minisign signatures. The Windows installer remains unsigned by Authenticode; the macOS app uses ad-hoc signing and is not notarized."
          if [ "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft 2>/dev/null)" = true ]; then
            gh release upload "$GITHUB_REF_NAME" release/* --clobber
            gh release edit "$GITHUB_REF_NAME" --notes "$notes"
          elif gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Refusing to modify an already-published release." >&2
            exit 1
          else
            gh release create "$GITHUB_REF_NAME" release/* --draft --verify-tag --title "OCG Manager $GITHUB_REF_NAME" --notes "$notes"
          fi

  verify-release:
    name: Verify draft release
    if: needs.plan.outputs.production == 'true'
    needs:
      - plan
      - draft-release
    runs-on: ubuntu-latest
    outputs:
      asset_digest: ${{ steps.asset_metadata.outputs.digest }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: assembled-release
          path: release

      - name: Read GitHub Release asset digests
        id: asset_metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ready=false
          for attempt in 1 2 3 4 5; do
            gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" \
              --jq '[.assets[] | {name, digest}]' > asset-metadata.json
            if jq -e 'length == 15 and all(.[]; .digest | type == "string")' asset-metadata.json >/dev/null; then
              ready=true
              break
            fi
            sleep 3
          done
          if [ "$ready" != true ]; then
            echo "GitHub did not expose all 15 immutable asset digests." >&2
            exit 1
          fi
          digest=$(jq -S -c 'sort_by(.name)' asset-metadata.json | sha256sum | cut -d' ' -f1)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Verify checksums, updater manifest, signatures, and server digests
        env:
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          node scripts/verify-release-assets.mjs \
            --release-dir release \
            --tag "$GITHUB_REF_NAME" \
            --repository "$GITHUB_REPOSITORY" \
            --asset-metadata asset-metadata.json

  publish-release:
    name: Publish verified release
    if: needs.plan.outputs.production == 'true'
    needs:
      - plan
      - verify-release
    runs-on: ubuntu-latest
    concurrency:
      group: release-moving-channels
      queue: max
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Publish verified draft
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERIFIED_ASSET_DIGEST: ${{ needs.verify-release.outputs.asset_digest }}
        run: |
          set -euo pipefail
          state=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" --jq .draft)
          if [ "$state" != true ]; then
            echo "Refusing to publish a release that is not the verified draft." >&2
            exit 1
          fi
          current_asset_digest=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" \
            --jq '[.assets[] | {name, digest}]' \
            | jq -S -c 'sort_by(.name)' \
            | sha256sum \
            | cut -d' ' -f1)
          if [ "$current_asset_digest" != "$VERIFIED_ASSET_DIGEST" ]; then
            echo "Refusing to publish: draft assets changed after verification." >&2
            exit 1
          fi
          latest_error="$RUNNER_TEMP/latest-release-error"
          if current_latest=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq .tag_name 2>"$latest_error"); then
            :
          elif grep -q '(HTTP 404)' "$latest_error"; then
            current_latest=
          else
            cat "$latest_error" >&2
            exit 1
          fi
          make_latest=$(node scripts/release-policy.mjs should-advance \
            --candidate "$GITHUB_REF_NAME" \
            --current "$current_latest")
          release_id=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$GITHUB_REF_NAME" --jq .id)
          gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$release_id" \
            -F draft=false \
            -f make_latest="$make_latest" \
            --silent
          if [ "$make_latest" = true ]; then
            echo "$GITHUB_REF_NAME advanced the GitHub latest channel (previous: ${current_latest:-none})."
          else
            echo "$GITHUB_REF_NAME was published without rolling back newer latest release $current_latest."
          fi
