name: Cross-platform release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            artifact: release-windows-x64
          - name: macOS Universal
            os: macos-15
            artifact: release-macos-universal
          - name: Linux x64
            os: ubuntu-22.04
            artifact: release-linux-x64

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate Windows release smoke syntax
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/validate-windows-release-smoke.ps1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.29.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev patchelf libfuse2 xvfb xauth xdg-utils dbus-x11

      - name: Install macOS Rust targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:web
      - run: pnpm run test
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: pnpm run design:lint

      - name: Validate pull-only Compose example
        if: runner.os == 'Linux'
        run: docker compose -f compose.example.yaml config --quiet

      - name: Build signed updater and platform artifacts
        env:
          OCG_REQUIRE_UPDATER_ARTIFACTS: "1"
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ vars.TAURI_UPDATER_PUBLIC_KEY }}
        run: pnpm run build

      - name: Smoke packaged CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-Content release/SHA256SUMS | ForEach-Object {
            if ($_ -notmatch '^([0-9a-f]{64})  (.+)$') { throw "Invalid checksum line: $_" }
            $actual = (Get-FileHash -Algorithm SHA256 (Join-Path release $Matches[2])).Hash.ToLowerInvariant()
            if ($actual -ne $Matches[1]) { throw "Checksum mismatch: $($Matches[2])" }
          }

          $package = Join-Path $env:RUNNER_TEMP cli-package
          Expand-Archive (Get-Item release/*windows-x64.zip) $package
          $cli = Join-Path $package ocg-manager-cli.exe
          if (!(Test-Path $cli) -or !(Test-Path (Join-Path $package dist/index.html)) -or !(Test-Path (Join-Path $package LICENSE))) {
            throw 'CLI package is incomplete'
          }

          $data = Join-Path $env:RUNNER_TEMP cli-data
          $added = (& $cli "--data-dir=$data" key add ci-smoke sk-ci-smoke | Out-String)
          if ($added -notmatch 'added key ([0-9a-f-]{36})') { throw "Cannot read account id: $added" }
          $id = $Matches[1]
          if (-not (& $cli "--data-dir=$data" key list | Select-String -SimpleMatch ci-smoke)) { throw 'Added account is missing' }
          & $cli "--data-dir=$data" key disable $id
          & $cli "--data-dir=$data" key enable $id
          if (-not (& $cli "--data-dir=$data" status | Select-String -SimpleMatch '1 total, 1 enabled')) { throw 'Unexpected CLI status' }

          $stdout = Join-Path $env:RUNNER_TEMP cli-serve.stdout.log
          $stderr = Join-Path $env:RUNNER_TEMP cli-serve.stderr.log
          $server = Start-Process $cli -ArgumentList @("--data-dir=$data", 'serve', '--port=19042') -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru -WindowStyle Hidden
          try {
            $ready = $false
            foreach ($attempt in 1..30) {
              try {
                if ((Invoke-WebRequest http://127.0.0.1:19042/dashboard/ -UseBasicParsing).Content -match 'id="app"') { $ready = $true; break }
              } catch {}
              Start-Sleep 1
            }
            if (!$ready) { throw "Packaged CLI dashboard did not start`n$(Get-Content $stdout, $stderr -ErrorAction SilentlyContinue | Out-String)" }
          } finally {
            if (!$server.HasExited) { Stop-Process -Id $server.Id -Force; $server.WaitForExit() }
          }

          & $cli "--data-dir=$data" key remove $id
          if (& $cli "--data-dir=$data" key list | Select-String -SimpleMatch ci-smoke) { throw 'Removed account is still listed' }

      - name: Smoke packaged CLI (macOS and Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ "$RUNNER_OS" = macOS ]; then
            (cd release && shasum -a 256 -c SHA256SUMS)
          else
            (cd release && sha256sum -c SHA256SUMS)
          fi

          package="$RUNNER_TEMP/cli-package"
          mkdir "$package"
          tar -xzf release/ocg-manager-cli_*.tar.gz -C "$package"
          cli="$package/ocg-manager-cli"
          test -x "$cli"
          test -f "$package/dist/index.html"
          test -f "$package/LICENSE"
          if [ "$RUNNER_OS" = macOS ]; then archs=$(lipo -archs "$cli"); grep -qw x86_64 <<<"$archs"; grep -qw arm64 <<<"$archs"; fi

          data="$RUNNER_TEMP/cli-data"
          added=$("$cli" --data-dir="$data" key add ci-smoke sk-ci-smoke)
          id=$(printf '%s\n' "$added" | sed -n 's/^added key \([^ ]*\).*/\1/p')
          test -n "$id"
          "$cli" --data-dir="$data" key list | grep -q ci-smoke
          "$cli" --data-dir="$data" key disable "$id"
          "$cli" --data-dir="$data" key enable "$id"
          "$cli" --data-dir="$data" status | grep -q '1 total, 1 enabled'

          log="$RUNNER_TEMP/cli-serve.log"
          "$cli" --data-dir="$data" serve --port=19042 >"$log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          ready=
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:19042/dashboard/ -o "$RUNNER_TEMP/dashboard.html" && grep -q 'id="app"' "$RUNNER_TEMP/dashboard.html"; then ready=1; break; fi
            sleep 1
          done
          if [ -z "$ready" ]; then cat "$log"; exit 1; fi
          kill "$server_pid"
          wait "$server_pid" || true
          trap - EXIT

          "$cli" --data-dir="$data" key remove "$id"
          remaining=$("$cli" --data-dir="$data" key list)
          ! grep -q ci-smoke <<<"$remaining"

      - name: Smoke installed GUI and overwrite bootstrap (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          function Wait-Dashboard {
            param(
              [string]$ExpectedVersion = '',
              [int]$Attempts = 60
            )
            foreach ($attempt in 1..$Attempts) {
              try {
                $html = (Invoke-WebRequest http://127.0.0.1:9042/dashboard/ -UseBasicParsing).Content
                if ($html -notmatch 'id="app"') { throw 'Dashboard HTML is incomplete' }
                if (!$ExpectedVersion) { return $null }
                $status = Invoke-RestMethod http://127.0.0.1:9042/dashboard/api/settings/update-status
                if ($status.current_version -eq $ExpectedVersion) { return $status }
              } catch {}
              Start-Sleep 1
            }
            throw "Installed GUI did not expose dashboard version $ExpectedVersion"
          }

          function Stop-InstalledGui {
            param([string]$ExecutablePath)
            if (!$ExecutablePath) { return }
            Get-Process -Name ocg-manager -ErrorAction SilentlyContinue | Where-Object {
              try { $_.Path -eq $ExecutablePath } catch { $false }
            } | ForEach-Object {
              Stop-Process -Id $_.Id -Force
              $_.WaitForExit()
            }
          }

          function Invoke-Installer {
            param(
              [string]$Path,
              [string[]]$Arguments,
              [string]$Label,
              [int]$TimeoutSeconds = 180
            )
            Write-Host "Starting $Label"
            # Start-Process -Wait follows the whole process tree on Windows.
            # An updater launched with /R intentionally leaves the restarted GUI
            # running, so wait only for the installer process itself.
            $installerProcess = Start-Process $Path -ArgumentList $Arguments -PassThru -WindowStyle Hidden
            if (!$installerProcess.WaitForExit(1000 * $TimeoutSeconds)) {
              try {
                $installerProcess.Kill($true)
                $null = $installerProcess.WaitForExit(30000)
              } catch {
                Stop-Process -Id $installerProcess.Id -Force -ErrorAction SilentlyContinue
              }
              throw "$Label did not exit within $TimeoutSeconds seconds"
            }
            if ($installerProcess.ExitCode -ne 0) {
              throw "$Label failed: $($installerProcess.ExitCode)"
            }
            Write-Host "Completed $Label"
          }

          $candidateVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $candidateInstaller = (Get-Item release/*windows-x64-setup.exe).FullName
          $installDir = Join-Path $env:RUNNER_TEMP ocg-manager-install
          $profile = Join-Path $env:RUNNER_TEMP ocg-manager-home
          New-Item -ItemType Directory -Force $profile | Out-Null
          $env:USERPROFILE = $profile
          $env:HOME = $profile
          $data = Join-Path $profile .ocg-mgr
          $sentinel = Join-Path $data preserve-me
          $runKey = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Run'
          $settingsUrl = 'http://127.0.0.1:9042/dashboard/api/settings'

          $latestTag = ''
          try {
            $latestTag = (& gh release view --repo $env:GITHUB_REPOSITORY --json tagName --jq .tagName).Trim()
            if ($LASTEXITCODE -ne 0) { throw 'gh release view failed' }
          } catch {
            if ($env:GITHUB_REF_TYPE -eq 'tag') {
              throw 'A tag release smoke requires a current published GitHub Release for the overwrite bootstrap.'
            }
            Write-Host 'No published release is available; using the candidate-only install smoke.'
            $latestTag = ''
          }

          $latestVersion = $latestTag -replace '^v', ''
          $bootstrapOverwrite = [bool]$latestTag
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch' -and $latestVersion -eq $candidateVersion) {
            Write-Host "Candidate v$candidateVersion is already latest; skipping the same-version bootstrap overwrite."
            $bootstrapOverwrite = $false
          }

          $previousInstaller = $null
          if ($bootstrapOverwrite) {
            $previousDir = Join-Path $env:RUNNER_TEMP previous-release
            New-Item -ItemType Directory -Force $previousDir | Out-Null
            & gh release download $latestTag --repo $env:GITHUB_REPOSITORY --pattern 'ocg-manager_*_windows-x64-setup.exe' --dir $previousDir
            if ($LASTEXITCODE -ne 0) { throw "Cannot download the published $latestTag Windows installer" }
            $previousInstallers = @(Get-ChildItem $previousDir -Filter '*windows-x64-setup.exe')
            if ($previousInstallers.Count -ne 1) {
              throw "Expected one published Windows installer for $latestTag, found $($previousInstallers.Count)"
            }
            $previousInstaller = $previousInstallers[0].FullName
          }

          $process = $null
          $guiPath = ''
          try {
            if ($bootstrapOverwrite) {
              Invoke-Installer -Path $previousInstaller -Arguments @('/S', "/D=$installDir") -Label "published $latestTag install"
              $gui = Get-ChildItem $installDir -Recurse -Filter ocg-manager.exe | Select-Object -First 1
              if (!$gui) { throw 'Published GUI executable is missing' }
              $guiPath = $gui.FullName
              $process = Start-Process $guiPath -ArgumentList '--startup' -PassThru -WindowStyle Hidden
              Wait-Dashboard

              New-Item -ItemType Directory -Force $data | Out-Null
              Set-Content $sentinel "preserved-from-$latestTag"
              $settings = Invoke-RestMethod $settingsUrl
              $settings.auto_start = $true
              Invoke-RestMethod $settingsUrl -Method Post -ContentType 'application/json' -Body ($settings | ConvertTo-Json) | Out-Null
              $expectedStartupValue = "`"$guiPath`" --startup"
              $startupValue = (Get-ItemProperty -LiteralPath $runKey -Name 'OCG Manager').'OCG Manager'
              if ($startupValue -ne $expectedStartupValue) { throw "Published install wrote unexpected startup value: $startupValue" }

              $previousPid = $process.Id
              Invoke-Installer -Path $candidateInstaller -Arguments @('/UPDATE', '/P', '/R', '/ARGS', '--startup') -Label 'candidate overwrite update'
              foreach ($attempt in 1..30) {
                if (!(Get-Process -Id $previousPid -ErrorAction SilentlyContinue)) { break }
                Start-Sleep 1
              }
              if (Get-Process -Id $previousPid -ErrorAction SilentlyContinue) {
                throw "Published GUI process $previousPid survived the overwrite update"
              }

              $updateStatus = Wait-Dashboard -ExpectedVersion $candidateVersion -Attempts 90
              if ($updateStatus.current_version -ne $candidateVersion) {
                throw "Unexpected updated GUI version: $($updateStatus.current_version)"
              }
              if ((Get-Content $sentinel -Raw).Trim() -ne "preserved-from-$latestTag") {
                throw 'Overwrite update did not preserve the data sentinel'
              }
              $startupValue = (Get-ItemProperty -LiteralPath $runKey -Name 'OCG Manager').'OCG Manager'
              if ($startupValue -ne $expectedStartupValue) { throw "Overwrite update changed startup value: $startupValue" }
            } else {
              Invoke-Installer -Path $candidateInstaller -Arguments @('/S', "/D=$installDir") -Label 'candidate install'
              $gui = Get-ChildItem $installDir -Recurse -Filter ocg-manager.exe | Select-Object -First 1
              if (!$gui) { throw 'Installed GUI executable is missing' }
              $guiPath = $gui.FullName
              $process = Start-Process $guiPath -ArgumentList '--startup' -PassThru -WindowStyle Hidden
              Wait-Dashboard -ExpectedVersion $candidateVersion | Out-Null
              New-Item -ItemType Directory -Force $data | Out-Null
              Set-Content $sentinel 'preserved'
            }

            $settings = Invoke-RestMethod $settingsUrl
            $settings.auto_start = $true
            Invoke-RestMethod $settingsUrl -Method Post -ContentType 'application/json' -Body ($settings | ConvertTo-Json) | Out-Null
            $startupValue = (Get-ItemProperty -LiteralPath $runKey -Name 'OCG Manager').'OCG Manager'
            $expectedStartupValue = "`"$guiPath`" --startup"
            if ($startupValue -ne $expectedStartupValue) { throw "Unexpected startup value: $startupValue" }

            $settings.auto_start = $false
            Invoke-RestMethod $settingsUrl -Method Post -ContentType 'application/json' -Body ($settings | ConvertTo-Json) | Out-Null
            if ((Get-ItemProperty -LiteralPath $runKey).PSObject.Properties.Name -contains 'OCG Manager') { throw 'Disabling auto-start left the startup entry behind' }
            $settings.auto_start = $true
            Invoke-RestMethod $settingsUrl -Method Post -ContentType 'application/json' -Body ($settings | ConvertTo-Json) | Out-Null
            $startupValue = (Get-ItemProperty -LiteralPath $runKey -Name 'OCG Manager').'OCG Manager'
            if ($startupValue -ne $expectedStartupValue) { throw "Unexpected restored startup value: $startupValue" }
          } finally {
            if ($process -and !$process.HasExited) { Stop-Process -Id $process.Id -Force; $process.WaitForExit() }
            Stop-InstalledGui $guiPath
          }

          $uninstaller = Get-ChildItem $installDir -Recurse -Filter uninstall.exe | Select-Object -First 1
          if (!$uninstaller) { throw 'Uninstaller is missing' }
          Write-Host 'Starting candidate uninstall'
          # NSIS copies the uninstaller to a temporary child process. Unlike the
          # /R updater path, waiting for this full process tree is intentional.
          $uninstall = Start-Process $uninstaller.FullName -ArgumentList '/S' -Wait -PassThru -WindowStyle Hidden
          if ($uninstall.ExitCode -ne 0) { throw "Candidate uninstall failed: $($uninstall.ExitCode)" }
          Write-Host 'Completed candidate uninstall'
          if ((Get-ItemProperty -LiteralPath $runKey).PSObject.Properties.Name -contains 'OCG Manager') { throw 'Uninstall left the startup entry behind' }
          if (!(Test-Path $sentinel)) { throw 'Silent uninstall deleted user data' }

      - name: Smoke mounted GUI (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mount="$RUNNER_TEMP/ocg-manager-dmg"
          mkdir "$mount"
          printf 'Y\n' | hdiutil attach release/ocg-manager_*_macos-universal.dmg -nobrowse -readonly -mountpoint "$mount"
          cleanup() {
            if [ -n "${gui_pid:-}" ]; then kill "$gui_pid" 2>/dev/null || true; fi
            hdiutil detach "$mount" -force >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          app=$(find "$mount" -maxdepth 1 -name '*.app' -print -quit)
          test -n "$app"
          gui="$app/Contents/MacOS/ocg-manager"
          test -x "$gui"
          codesign --verify --deep --strict "$app"
          archs=$(lipo -archs "$gui")
          grep -qw x86_64 <<<"$archs"
          grep -qw arm64 <<<"$archs"

          home="$RUNNER_TEMP/ocg-manager-home"
          mkdir "$home"
          HOME="$home" "$gui" --startup >"$RUNNER_TEMP/gui.log" 2>&1 &
          gui_pid=$!
          ready=
          for _ in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:9042/dashboard/ -o "$RUNNER_TEMP/dashboard.html" && grep -q 'id="app"' "$RUNNER_TEMP/dashboard.html"; then ready=1; break; fi
            sleep 1
          done
          if [ -z "$ready" ]; then cat "$RUNNER_TEMP/gui.log"; exit 1; fi

      - name: Smoke AppImage GUI (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          appimage=$(echo release/ocg-manager_*_linux-x64.AppImage)
          deb=$(echo release/ocg-manager_*_linux-x64.deb)
          dpkg-deb --info "$deb" >/dev/null
          dpkg-deb --contents "$deb" >"$RUNNER_TEMP/deb-contents"
          grep -q ocg-manager "$RUNNER_TEMP/deb-contents"
          file "$appimage" | grep -q 'x86-64'
          chmod +x "$appimage"

          home="$RUNNER_TEMP/ocg-manager-home"
          runtime="$RUNNER_TEMP/xdg-runtime"
          mkdir "$home" "$runtime"
          chmod 700 "$runtime"
          setsid dbus-run-session -- xvfb-run -a env HOME="$home" XDG_RUNTIME_DIR="$runtime" APPIMAGE_EXTRACT_AND_RUN=1 WEBKIT_DISABLE_COMPOSITING_MODE=1 "$appimage" --startup >"$RUNNER_TEMP/gui.log" 2>&1 &
          gui_pid=$!
          trap 'kill -- -"$gui_pid" 2>/dev/null || true' EXIT
          ready=
          for _ in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:9042/dashboard/ -o "$RUNNER_TEMP/dashboard.html" && grep -q 'id="app"' "$RUNNER_TEMP/dashboard.html"; then ready=1; break; fi
            sleep 1
          done
          if [ -z "$ready" ]; then cat "$RUNNER_TEMP/gui.log"; exit 1; fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error

  draft-release:
    name: Draft GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: artifacts

      - name: Assemble release and checksums
        shell: bash
        run: |
          mkdir release
          find artifacts -type f ! -name SHA256SUMS -exec cp {} release/ \;
          cp compose.example.yaml release/
          node scripts/generate-updater-manifest.mjs \
            --release-dir release \
            --tag "$GITHUB_REF_NAME" \
            --repository "$GITHUB_REPOSITORY"
          (cd release && sha256sum * > SHA256SUMS)

      - name: Create or update draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          notes="Updater payloads include Tauri minisign signatures. The Windows installer remains unsigned by Authenticode; the macOS app uses ad-hoc signing and is not notarized."
          if [ "$(gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft 2>/dev/null)" = true ]; then
            gh release upload "$GITHUB_REF_NAME" release/* --clobber
            gh release edit "$GITHUB_REF_NAME" --notes "$notes"
          elif gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Refusing to modify an already-published release." >&2
            exit 1
          else
            gh release create "$GITHUB_REF_NAME" release/* --draft --verify-tag --title "OCG Manager $GITHUB_REF_NAME" --notes "$notes"
          fi
