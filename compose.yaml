services:
  ocg-manager:
    build:
      context: .
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
        CARGO_REGISTRY: ${CARGO_REGISTRY:-sparse+https://index.crates.io/}
    image: ${OCG_IMAGE:-ghcr.io/klarkxy/opencode-go-mgr:latest}
    restart: unless-stopped
    environment:
      - OCG_ADMIN_USERNAME
      - OCG_ADMIN_PASSWORD
      - OCG_MANAGER_ENCRYPTION_KEY
      - OCG_CLIENT_ROOT_URL
    ports:
      - "127.0.0.1:${OCG_PORT:-9042}:9042"
    volumes:
      - ocg-data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  ocg-data:
