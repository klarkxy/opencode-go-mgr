# Pull-only Docker Compose example for OCG Manager v1.5.3.
# Save this file as compose.yaml. Optionally create a neighboring .env file
# with OCG_PORT, OCG_IMAGE, or the runtime variables listed below.
services:
  ocg-manager:
    image: ${OCG_IMAGE:-ghcr.io/klarkxy/opencode-go-mgr:1.5.3}
    platform: linux/amd64
    restart: unless-stopped
    environment:
      - OCG_ADMIN_USERNAME
      - OCG_ADMIN_PASSWORD
      - OCG_MANAGER_ENCRYPTION_KEY
      - OCG_CLIENT_ROOT_URL
    ports:
      - "127.0.0.1:${OCG_PORT:-9042}:9042"
    volumes:
      - ocg-data:/data
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

volumes:
  ocg-data:
